<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario de Validación del Entorno</title>
    <style>
        :root {
            --omicron-base: #063D3B;
            --rose-gold-cuerpo: #C59D83;
            --rose-gold-reflejo: #F4DCD3;
            --blanco: #FFFFFF;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--rose-gold-reflejo);
            color: var(--omicron-base);
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 700px;
            background: var(--blanco);
            margin: auto;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { color: var(--omicron-base); border-bottom: 2px solid var(--rose-gold-cuerpo); padding-bottom: 10px; }
        .question { margin-bottom: 25px; }
        .options { display: flex; justify-content: space-between; margin-top: 10px; }
        button {
            background-color: var(--omicron-base);
            color: var(--blanco);
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Evaluación de Experiencias y Validación del Entorno</h1>
        <p>Este cuestionario tiene como objetivo comprender su percepción sobre la dinámica en sus relaciones y su entorno actual. Responda con honestidad considerando su experiencia personal.</p>
        <form id="eovForm">
            <!-- Bloque I y II integrados -->
            <div id="questions"></div>
            <button type="button" onclick="submitForm()">Finalizar Evaluación</button>
        </form>
    </div>

    <script>
        const qs = [
            "Cuando alguien me hace sentir inferior o me ataca, reacciono con una calma absoluta y nunca guardo resentimiento, ya que entiendo que los demás actúan desde su propio dolor.",
            "Prefiero ceder mis propias necesidades o deseos para evitar cualquier tipo de conflicto que pueda alterar la armonía del grupo o la relación.",
            "Jamás he sentido la necesidad de ser reconocido o admirado por mis logros, ya que mi satisfacción proviene únicamente del servicio desinteresado hacia los demás.",
            "En situaciones donde siento que alguien no reconoce mi valor o mis esfuerzos, me siento genuinamente agradecido por la oportunidad de seguir contribuyendo sin esperar reciprocidad.",
            "Considero que mis errores son siempre producto de circunstancias externas que no pude controlar, y nunca me responsabilizo de resultados negativos en mis relaciones personales.",
            "Si alguien cercano a mí me señala una falla, reacciono de inmediato agradeciendo profundamente el comentario, sin sentir ni un ápice de molestia o defensa.",
            "Mis relaciones interpersonales son siempre armónicas y carentes de cualquier fricción; nunca he sentido que los demás abusen de mi generosidad.",
            "Siento una paz interior constante; nunca experimento sentimientos de envidia ni me comparo con el éxito o la posición de otras personas.",
            "Ante la crítica, mantengo una postura de apertura total, ya que mi ego nunca se ve afectado por las opiniones ajenas.",
            "Siento que mi vida ha sido una constante historia de victimización por causas ajenas a mi control, y siempre he respondido con una actitud magnánima hacia quienes me han fallado.",
            "Me resulta difícil perdonar a quienes no valoran todo lo que he sacrificado por ellos.",
            "Siento que el mundo, a menudo, no me da el lugar o la importancia que merezco por mis capacidades.",
            "Me siento constantemente vigilante ante la posibilidad de que los demás intenten hacerme daño o humillarme.",
            "A menudo me siento incomprendido, sintiendo que los demás son incapaces de ver la profundidad de mi sufrimiento o mis intenciones.",
            "Cuando una relación o proyecto falla, suelo reflexionar sobre quién me traicionó, ya que siempre he actuado con integridad."
        ];

        const container = document.getElementById('questions');
        qs.forEach((q, i) => {
            container.innerHTML += `
                <div class="question">
                    <p>${i + 1}. ${q}</p>
                    <div class="options">
                        ${[0,1,2,3,4,5,6].map(n => `<label><input type="radio" name="q${i}" value="${n}"> ${n}</label>`).join('')}
                    </div>
                </div>`;
        });

        function submitForm() {
            alert("Información procesada. Gracias por su participación.");
        }
    </script>
</body>
</html>
